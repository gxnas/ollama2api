name: Sync Upstream

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/xiaolajiaoyyds/ollama2api.git
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only
          git push origin main
