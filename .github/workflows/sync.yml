name: Sync Upstream

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/xiaolajiaoyyds/ollama2api.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/main)

          echo "local=$LOCAL"
          echo "remote=$REMOTE"

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "update=false" >> $GITHUB_OUTPUT
          else
            echo "update=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        if: steps.check.outputs.update == 'true'
        run: |
          git merge upstream/main --ff-only
          git push origin main
