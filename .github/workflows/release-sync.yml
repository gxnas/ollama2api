name: Sync Upstream Release

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Get upstream release
        id: release
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/xiaolajiaoyyds/ollama2api/releases/latest | jq -r .tag_name)
          echo "tag=$RELEASE" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.release.outputs.tag }} || true
          git push origin ${{ steps.release.outputs.tag }} || true
